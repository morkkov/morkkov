name: Update README

on:
  schedule:
    - cron: "0 12 * * *" # ежедневно в 12:00 UTC
  workflow_dispatch: # можно запускать вручную

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Генерируем карточки с учётом приватных репо (PAT с repo + read:user)
      - name: Generate Stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=morkkov&show_icons=true&theme=default&hide_border=true&disable_animations=true
          path: profile/stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate Top Languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=morkkov&layout=compact&theme=default&hide_border=true&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Commit cards
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update stats cards" || true
          git push
